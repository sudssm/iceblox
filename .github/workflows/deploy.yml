name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - uses: railwayapp/deploy@v1
        with:
          service: server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
