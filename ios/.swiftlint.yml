included:
  - CamerasApp
  - CamerasAppTests

excluded:
  - build
  - DerivedData
  - .build

disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - closure_spacing
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - last_where
  - modifier_order
  - overridden_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - yoda_condition

line_length:
  warning: 150
  error: 250
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 600
  error: 1000

function_body_length:
  warning: 65
  error: 120

cyclomatic_complexity:
  warning: 13

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 60
  excluded:
    - id
    - x
    - y
    - i
    - j
    - ok
    - db
    - to
    - plate_hash
    - SQLITE_TRANSIENT
